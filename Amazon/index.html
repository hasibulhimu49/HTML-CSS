<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="navbar">
        <!-- Box1 -->
        <div class="nav-logo border">
          <div class="logo"></div>
        </div>

        <!-- Box2 -->
        <div class="nav-address border">
          <p class="add-first">Delivery to</p>
          <div class="add-icon">
            <i class="fa-solid fa-location-dot"></i>
            <p class="add-second">Bangladesh</p>
          </div>
        </div>

        <!-- Box3 -->
        <div class="nav-search">
          <div class="search-left">
            <select>
                <option>All</option>
             </select>
          </div>

          <div class="search-middle">
            <input type="text" placeholder="Search Amozon">
          </div>

          <div class="search-right">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>

        <!-- Box4 -->
         <div class="nav-sign border">
            <p class="first-sign">Hello, sign in</p>
            <select class="second-sign">
                <option>Accounts & Lists</option>
             </select>
         </div>

         <!-- Box5 -->
         <div class="nav-order border">
            <p class="first-order">Return</p>
            <p class="second-order">& Orders</p>
         </div>

           <!-- Box6 -->
         <div class="nav-cart border">
            <div class="cart-logo">
                  <i class="fa-solid fa-cart-arrow-down"></i>
            </div>
            <div class="cart-text" >
                <p >Cart</p>
            </div>
         </div>

      </div>
    </header>
  </body>
</html>
